<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Muscu">
<meta name="theme-color" content="#1a1a2e">
<title>Muscu — PPL Tracker</title>
<style>
:root {
  --bg: #0f0f1a;
  --bg2: #1a1a2e;
  --bg3: #252540;
  --card: #1e1e35;
  --border: rgba(255,255,255,0.08);
  --text: #f0f0f8;
  --muted: #8888aa;
  --accent: #6c63ff;
  --accent2: #ff6584;
  --green: #43d98c;
  --orange: #ff9f43;
  --red: #ff6b6b;
  --blue: #54a0ff;
  --safe: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; overscroll-behavior: none; }
body { display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; }

/* NAV */
.nav { display: flex; background: var(--bg2); border-top: 0.5px solid var(--border); padding: 8px 0 calc(8px + var(--safe)); position: sticky; bottom: 0; z-index: 100; }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 0; border: none; background: none; color: var(--muted); font-size: 10px; cursor: pointer; transition: color .15s; }
.nav-btn.active { color: var(--accent); }
.nav-icon { width: 22px; height: 22px; }

/* SCREENS */
.screen { display: none; flex-direction: column; flex: 1; overflow-y: auto; padding-bottom: 80px; }
.screen.active { display: flex; }

/* HEADER */
.header { padding: 56px 20px 16px; background: var(--bg2); position: sticky; top: 0; z-index: 50; border-bottom: 0.5px solid var(--border); }
.header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
.header p { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* CARDS */
.section { padding: 16px 16px 0; }
.section-title { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
.card { background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.card-row { display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer; }
.card-row:active { background: var(--bg3); }
.card-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; }
.card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.card-badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.card-arrow { color: var(--muted); font-size: 18px; }

/* DETAIL */
.detail-header { padding: 56px 20px 20px; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
.back-btn { display: flex; align-items: center; gap: 6px; color: var(--accent); font-size: 16px; border: none; background: none; cursor: pointer; margin-bottom: 12px; padding: 0; }
.day-tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
.detail-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
.detail-header p { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* EXERCISE CARD */
.exo-card { background: var(--card); border-radius: 16px; border: 0.5px solid var(--border); margin: 10px 16px 0; overflow: hidden; }
.exo-header { padding: 14px 16px 10px; border-bottom: 0.5px solid var(--border); }
.exo-num { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 2px; }
.exo-name { font-size: 16px; font-weight: 700; }
.exo-note { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }
.exo-meta { display: flex; gap: 16px; padding: 10px 16px; }
.exo-stat { display: flex; flex-direction: column; }
.exo-stat-val { font-size: 15px; font-weight: 600; color: var(--text); }
.exo-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 1px; }

/* LOG FORM */
.log-section { padding: 12px 16px; border-top: 0.5px solid var(--border); }
.log-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.log-inputs { display: flex; gap: 8px; align-items: flex-end; }
.log-field { flex: 1; }
.log-field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
.log-field input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 16px; font-weight: 600; text-align: center; -webkit-appearance: none; }
.log-field input:focus { outline: none; border-color: var(--accent); }
.save-btn { background: var(--accent); color: white; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.save-btn:active { opacity: 0.8; }
.last-session { font-size: 12px; color: var(--green); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
.pr-badge { background: rgba(255,159,67,0.15); color: var(--orange); font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 8px; margin-left: 6px; }

/* PROGRESS */
.prog-bar-wrap { padding: 0 16px; margin-top: 10px; }
.prog-bar-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.prog-bar-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }

/* STATS SCREEN */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 16px; }
.stat-card { background: var(--card); border-radius: 14px; padding: 16px; border: 0.5px solid var(--border); }
.stat-val { font-size: 28px; font-weight: 700; }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
.streak-card { background: var(--card); border-radius: 16px; margin: 0 16px 10px; padding: 20px; border: 0.5px solid var(--border); display: flex; align-items: center; gap: 16px; }
.streak-num { font-size: 48px; font-weight: 800; color: var(--orange); line-height: 1; }
.history-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 0.5px solid var(--border); }
.history-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.history-info { flex: 1; }
.history-name { font-size: 14px; font-weight: 600; }
.history-date { font-size: 12px; color: var(--muted); }
.history-val { font-size: 14px; font-weight: 700; color: var(--green); }
.empty-state { text-align: center; padding: 60px 30px; color: var(--muted); font-size: 15px; line-height: 1.6; }

/* NUTRITION */
.macro-ring { display: flex; justify-content: center; padding: 24px 16px 16px; }
.macro-circle { position: relative; width: 160px; height: 160px; }
.macro-circle svg { transform: rotate(-90deg); }
.macro-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.macro-center-val { font-size: 26px; font-weight: 800; }
.macro-center-lbl { font-size: 11px; color: var(--muted); }
.macro-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 16px; }
.macro-item { background: var(--card); border-radius: 12px; padding: 12px 14px; border: 0.5px solid var(--border); }
.macro-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.macro-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.macro-item-name { font-size: 12px; color: var(--muted); }
.macro-item-val { font-size: 20px; font-weight: 700; }
.macro-item-unit { font-size: 12px; color: var(--muted); margin-left: 2px; }
.meal-card { background: var(--card); border-radius: 16px; margin: 0 16px 10px; border: 0.5px solid var(--border); overflow: hidden; }
.meal-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); }
.meal-time { font-size: 13px; font-weight: 700; }
.meal-kcal { font-size: 12px; color: var(--muted); }
.meal-body { padding: 12px 16px; }
.meal-line { font-size: 13px; color: var(--muted); line-height: 1.8; }
.meal-line span { color: var(--text); font-weight: 500; }

/* TOAST */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--green); color: #0a2e1a; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; opacity: 0; transition: all .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="screen-home" class="screen active">
  <div class="header">
    <h1>Programme PPL</h1>
    <p id="home-subtitle">Choisissez une séance</p>
  </div>
  <div id="home-content"></div>
</div>

<div id="screen-session" class="screen">
  <div class="detail-header">
    <button class="back-btn" onclick="goHome()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      Retour
    </button>
    <div id="session-tag" class="day-tag"></div>
    <h2 id="session-title"></h2>
    <p id="session-sub"></p>
  </div>
  <div id="session-content"></div>
  <div style="height:20px"></div>
</div>

<div id="screen-stats" class="screen">
  <div class="header"><h1>Progression</h1><p>Historique & records</p></div>
  <div id="stats-content"></div>
</div>

<div id="screen-nutrition" class="screen">
  <div class="header"><h1>Nutrition</h1><p>Plan végétarien · ~60 kg</p></div>
  <div id="nutri-content"></div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="nav-home" onclick="showScreen('home')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Séances
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showScreen('stats')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Progrès
  </button>
  <button class="nav-btn" id="nav-nutrition" onclick="showScreen('nutrition')">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
    Nutrition
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const DAYS = [
  { id:'j1', label:'Jour 1', name:'Push A — lourd', sub:'Pecs · Épaules · Triceps', color:'#ff6b6b', tag:'Push', duration:'85–95 min',
    exos:[
      {id:'incline_press', name:'Incline Chest Press machine', sets:'4', reps:'6–8', rest:'2 min', note:'Angle 30–45°, descente 3 s'},
      {id:'chest_press', name:'Chest Press convergente', sets:'3', reps:'8–10', rest:'90 s', note:'Descente lente 3 s'},
      {id:'pec_fly', name:'Pec Fly machine', sets:'3', reps:'12–15', rest:'75 s', note:'Pause 1 s en contraction'},
      {id:'shoulder_press', name:'Shoulder Press machine', sets:'4', reps:'6–8', rest:'2 min', note:'Ne pas verrouiller en haut'},
      {id:'lat_raise', name:'Élévations latérales machine', sets:'4', reps:'12–15', rest:'60 s', note:'Deltoïdes médians'},
      {id:'triceps_pushdown', name:'Triceps Pushdown câble', sets:'3', reps:'10–12', rest:'75 s', note:'Coudes fixes'},
      {id:'overhead_tri', name:'Overhead Triceps câble (corde)', sets:'2', reps:'12–15', rest:'60 s', note:'Chef long'},
    ]},
  { id:'j2', label:'Jour 2', name:'Pull A — lourd', sub:'Dos · Biceps', color:'#54a0ff', tag:'Pull', duration:'85–95 min',
    exos:[
      {id:'lat_pulldown_a', name:'Lat Pulldown (prise serrée)', sets:'4', reps:'6–8', rest:'2 min', note:'Étire bien en haut'},
      {id:'row_machine', name:'Row assis machine', sets:'4', reps:'8–10', rest:'90 s', note:'Dos épais prioritaire'},
      {id:'row_cable', name:'Row poulie basse câble', sets:'3', reps:'10–12', rest:'90 s', note:'Buste penché en avant'},
      {id:'reverse_deck', name:'Reverse Pec Deck', sets:'3', reps:'15', rest:'60 s', note:'Deltoïde postérieur'},
      {id:'curl_machine', name:'Curl machine assis', sets:'3', reps:'8–10', rest:'75 s', note:'Contraction longue'},
      {id:'curl_cable_uni', name:'Curl câble unilatéral', sets:'2', reps:'12–15', rest:'60 s', note:'Supination prononcée'},
    ]},
  { id:'j3', label:'Jour 3', name:'Legs A + Core', sub:'Jambes · Abdos', color:'#43d98c', tag:'Legs', duration:'95–105 min',
    exos:[
      {id:'leg_press_a', name:'Leg Press', sets:'4', reps:'8–10', rest:'2 min', note:'Pieds milieu/haut'},
      {id:'leg_ext', name:'Leg Extension machine', sets:'3', reps:'12–15', rest:'90 s', note:'Pause 1 s en haut'},
      {id:'leg_curl_a', name:'Leg Curl machine', sets:'3', reps:'10–12', rest:'90 s', note:'Descente lente 3 s'},
      {id:'hip_thrust', name:'Hip Thrust machine', sets:'3', reps:'10–12', rest:'90 s', note:'Fessiers + ischio'},
      {id:'calves_press', name:'Mollets presse', sets:'4', reps:'15–20', rest:'60 s', note:'Amplitude max'},
      {id:'crunch_cable', name:'Crunch câble', sets:'3', reps:'12–15', rest:'60 s', note:'Core intense'},
      {id:'plank_weighted', name:'Gainage frontal lesté', sets:'3', reps:'45–60 s', rest:'60 s', note:'Core intense'},
      {id:'leg_raises', name:'Relevés de jambes', sets:'3', reps:'12', rest:'60 s', note:'Core intense'},
    ]},
  { id:'j4', label:'Jour 4', name:'Push B — volume', sub:'Pecs · Épaules · Triceps', color:'#ff9f43', tag:'Push', duration:'85–95 min',
    exos:[
      {id:'chest_press_b', name:'Chest Press convergente (plat)', sets:'3', reps:'10–12', rest:'90 s', note:'Amplitude complète'},
      {id:'pec_fly_b', name:'Pec Fly machine (angle diff.)', sets:'3', reps:'13–15', rest:'75 s', note:'Pause 2 s en contraction'},
      {id:'shoulder_press_b', name:'Shoulder Press machine', sets:'3', reps:'10–12', rest:'90 s', note:'Prise neutre'},
      {id:'lat_raise_b', name:'Élévations latérales câble', sets:'4', reps:'15–20', rest:'60 s', note:'Charges légères, forme parfaite'},
      {id:'triceps_rope', name:'Triceps Pushdown corde', sets:'3', reps:'13–15', rest:'75 s', note:'Écarte la corde en bas'},
      {id:'dips', name:'Dips assistés machine', sets:'3', reps:'10–12', rest:'90 s', note:'Penché en avant = + pecs'},
    ]},
  { id:'j5', label:'Jour 5', name:'Pull B + Core léger', sub:'Dos · Biceps · Abdos', color:'#a29bfe', tag:'Pull', duration:'85–95 min',
    exos:[
      {id:'lat_pulldown_b', name:'Lat Pulldown prise large', sets:'3', reps:'10–12', rest:'90 s', note:'Élargissement du dos'},
      {id:'row_horiz', name:'Row horizontal machine', sets:'3', reps:'10–12', rest:'90 s', note:''},
      {id:'face_pull', name:'Face Pull câble (corde)', sets:'3', reps:'15', rest:'60 s', note:'Coudes hauts, paumes vers haut'},
      {id:'reverse_deck_b', name:'Reverse Pec Deck', sets:'3', reps:'15', rest:'60 s', note:''},
      {id:'curl_ez', name:'Curl câble barre EZ', sets:'3', reps:'10–12', rest:'75 s', note:''},
      {id:'hammer_curl', name:'Curl marteau câble', sets:'2', reps:'12–15', rest:'60 s', note:'Épaisseur du bras'},
      {id:'knee_raises', name:'Relevés de genoux suspendus', sets:'3', reps:'12–15', rest:'60 s', note:'Core léger'},
      {id:'hollow_hold', name:'Hollow hold', sets:'3', reps:'25 s', rest:'60 s', note:'Core léger'},
    ]},
  { id:'j6', label:'Jour 6', name:'Legs B + Core moyen', sub:'Jambes · Abdos', color:'#ffd32a', tag:'Legs', duration:'85–95 min',
    exos:[
      {id:'leg_press_b', name:'Leg Press (amplitude max)', sets:'3', reps:'12–15', rest:'90 s', note:'Léger'},
      {id:'hack_squat', name:'Hack Squat / Leg Press pieds hauts', sets:'3', reps:'10–12', rest:'90 s', note:'Vaste interne + quads'},
      {id:'leg_curl_b', name:'Leg Curl allongé', sets:'3', reps:'12–15', rest:'90 s', note:''},
      {id:'unilateral_press', name:'Leg Press unilatéral', sets:'3', reps:'12/jambe', rest:'90 s', note:'Remplace les fentes'},
      {id:'calves_b', name:'Mollets debout ou presse', sets:'3', reps:'15–20', rest:'60 s', note:''},
      {id:'side_plank', name:'Gainage latéral', sets:'3', reps:'35 s/côté', rest:'60 s', note:'Core moyen'},
      {id:'dead_bug', name:'Dead bug', sets:'3', reps:'30 s', rest:'60 s', note:'Core moyen'},
    ]},
];

function getLog() { try { return JSON.parse(localStorage.getItem('ppl_log') || '{}'); } catch(e) { return {}; } }
function saveLog(log) { localStorage.setItem('ppl_log', JSON.stringify(log)); }
function getBodyLog() { try { return JSON.parse(localStorage.getItem('ppl_body') || '[]'); } catch(e) { return []; } }

let currentDay = null;

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if(name === 'stats') renderStats();
  if(name === 'nutrition') renderNutrition();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// HOME
function renderHome() {
  const log = getLog();
  const today = new Date().toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  document.getElementById('home-subtitle').textContent = today;

  let html = '';
  const labels = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];
  const schedule = ['j1','j2','j3','j4','j5','j6','rest'];

  html += '<div class="section"><div class="section-title">Programme de la semaine</div>';
  DAYS.forEach((day, i) => {
    const lastDate = log[day.id] ? Object.keys(log[day.id]).sort().slice(-1)[0] : null;
    const done = lastDate && lastDate === new Date().toISOString().split('T')[0];
    html += `<div class="card"><div class="card-row" onclick="openDay('${day.id}')">
      <div class="card-dot" style="background:${day.color}"></div>
      <div class="card-info">
        <div class="card-title">${day.label} — ${day.name}</div>
        <div class="card-sub">${day.sub} · ${day.duration}</div>
      </div>
      ${done ? '<div class="card-badge" style="background:rgba(67,217,140,0.15);color:#43d98c">Fait</div>' : '<div class="card-arrow">›</div>'}
    </div></div>`;
  });
  html += '<div class="card"><div class="card-row" style="cursor:default"><div class="card-dot" style="background:#666"></div><div class="card-info"><div class="card-title">Jour 7 — Repos total</div><div class="card-sub">Marche · Étirements · Récupération</div></div></div></div>';
  html += '</div>';

  // Quick tips
  html += '<div class="section" style="margin-top:8px"><div class="section-title">Rappels clés</div>';
  html += '<div class="card"><div style="padding:14px 16px;display:flex;flex-direction:column;gap:8px;">';
  [['RIR 1–2','S\'arrêter 1–2 reps avant l\'échec'],['Progressive overload','+1 rep ou +2.5 kg / semaine'],['Repos polyarticulaires','90–120 secondes'],['Repos isolations','60–90 secondes']].forEach(([k,v]) => {
    html += `<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px"><span style="font-size:13px;font-weight:600;color:var(--accent);flex-shrink:0">${k}</span><span style="font-size:12px;color:var(--muted);text-align:right">${v}</span></div>`;
  });
  html += '</div></div></div><div style="height:8px"></div>';

  document.getElementById('home-content').innerHTML = html;
}

function openDay(dayId) {
  currentDay = DAYS.find(d => d.id === dayId);
  if(!currentDay) return;

  const tagColors = { Push:'rgba(255,107,107,0.15)', Pull:'rgba(84,160,255,0.15)', Legs:'rgba(67,217,140,0.15)' };
  const tagText = { Push:'#ff6b6b', Pull:'#54a0ff', Legs:'#43d98c' };

  document.getElementById('session-tag').textContent = currentDay.tag;
  document.getElementById('session-tag').style.background = tagColors[currentDay.tag];
  document.getElementById('session-tag').style.color = tagText[currentDay.tag];
  document.getElementById('session-title').textContent = currentDay.name;
  document.getElementById('session-sub').textContent = currentDay.sub + ' · ' + currentDay.duration;

  renderSession();
  showScreen('session');
}

function renderSession() {
  if(!currentDay) return;
  const log = getLog();
  const dayLog = log[currentDay.id] || {};
  const today = new Date().toISOString().split('T')[0];

  let html = '';
  // Échauffement
  html += '<div class="card" style="margin:10px 16px 0"><div style="padding:12px 16px"><div style="font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Échauffement · 10 min</div>';
  html += '<div style="font-size:13px;color:var(--muted);line-height:1.8">5 min cardio léger · Mobilité ciblée · 1–2 séries légères du 1er exercice</div></div></div>';

  currentDay.exos.forEach((exo, idx) => {
    const exoHistory = dayLog[exo.id] || [];
    const last = exoHistory.length ? exoHistory[exoHistory.length - 1] : null;
    const todayEntry = last && last.date === today ? last : null;
    const prevEntry = exoHistory.filter(e => e.date !== today).slice(-1)[0] || null;
    const isPR = last && exoHistory.length > 1 && parseFloat(last.weight) > Math.max(...exoHistory.slice(0,-1).map(e => parseFloat(e.weight)||0));

    html += `<div class="exo-card">
      <div class="exo-header">
        <div class="exo-num">Exercice ${idx+1}</div>
        <div class="exo-name">${exo.name}</div>
        ${exo.note ? `<div class="exo-note">${exo.note}</div>` : ''}
      </div>
      <div class="exo-meta">
        <div class="exo-stat"><div class="exo-stat-val">${exo.sets}</div><div class="exo-stat-lbl">Séries</div></div>
        <div class="exo-stat"><div class="exo-stat-val">${exo.reps}</div><div class="exo-stat-lbl">Reps</div></div>
        <div class="exo-stat"><div class="exo-stat-val">${exo.rest}</div><div class="exo-stat-lbl">Repos</div></div>
      </div>
      <div class="log-section">
        <div class="log-title">Enregistrer</div>
        <div class="log-inputs">
          <div class="log-field"><label>Charge (kg)</label><input type="number" id="w_${exo.id}" placeholder="${prevEntry ? prevEntry.weight : '—'}" value="${todayEntry ? todayEntry.weight : ''}" inputmode="decimal" step="0.5"></div>
          <div class="log-field"><label>Reps réalisées</label><input type="number" id="r_${exo.id}" placeholder="${prevEntry ? prevEntry.reps : '—'}" value="${todayEntry ? todayEntry.reps : ''}" inputmode="numeric"></div>
          <button class="save-btn" onclick="logExo('${exo.id}')">OK</button>
        </div>
        ${prevEntry ? `<div class="last-session">Dernière fois : ${prevEntry.weight} kg × ${prevEntry.reps} reps${isPR && todayEntry ? '<span class="pr-badge">PR</span>' : ''}</div>` : '<div class="last-session" style="color:var(--muted)">Première fois — note ta charge de référence</div>'}
      </div>
    </div>`;
  });

  document.getElementById('session-content').innerHTML = html;
}

function logExo(exoId) {
  const w = document.getElementById('w_'+exoId).value;
  const r = document.getElementById('r_'+exoId).value;
  if(!w && !r) return;

  const log = getLog();
  if(!log[currentDay.id]) log[currentDay.id] = {};
  if(!log[currentDay.id][exoId]) log[currentDay.id][exoId] = [];

  const today = new Date().toISOString().split('T')[0];
  const existing = log[currentDay.id][exoId];
  const todayIdx = existing.findIndex(e => e.date === today);
  const entry = { date: today, weight: w || '0', reps: r || '0' };

  if(todayIdx >= 0) existing[todayIdx] = entry;
  else existing.push(entry);

  saveLog(log);
  showToast('Enregistré ✓');
  renderSession();
}

function goHome() {
  currentDay = null;
  renderHome();
  showScreen('home');
}

// STATS
function renderStats() {
  const log = getLog();
  const allEntries = [];
  DAYS.forEach(day => {
    const dayLog = log[day.id] || {};
    Object.entries(dayLog).forEach(([exoId, entries]) => {
      const exo = day.exos.find(e => e.id === exoId);
      entries.forEach(e => {
        if(e.weight && parseFloat(e.weight) > 0) allEntries.push({ day: day.name, exo: exo ? exo.name : exoId, ...e });
      });
    });
  });

  allEntries.sort((a,b) => b.date.localeCompare(a.date));
  const totalSessions = new Set(allEntries.map(e => e.date)).size;
  const totalSets = allEntries.length;

  // Streak
  const dates = [...new Set(allEntries.map(e => e.date))].sort().reverse();
  let streak = 0;
  const today = new Date();
  for(let i = 0; i < dates.length; i++) {
    const d = new Date(dates[i]);
    const diff = Math.round((today - d) / 86400000);
    if(diff <= i + 1) streak++; else break;
  }

  let html = '';
  html += `<div class="streak-card">
    <div class="streak-num">${streak}</div>
    <div><div style="font-size:16px;font-weight:700">jour${streak!==1?'s':''} consécutif${streak!==1?'s':''}</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Continue comme ça !</div></div>
  </div>`;

  html += '<div class="stat-grid">';
  html += `<div class="stat-card"><div class="stat-val" style="color:var(--accent)">${totalSessions}</div><div class="stat-lbl">Séances réalisées</div></div>`;
  html += `<div class="stat-card"><div class="stat-val" style="color:var(--green)">${totalSets}</div><div class="stat-lbl">Séries enregistrées</div></div>`;
  html += '</div>';

  if(allEntries.length === 0) {
    html += '<div class="empty-state">Aucune séance enregistrée<br><span style="font-size:13px">Lance ta première séance et note tes charges</span></div>';
  } else {
    html += '<div class="section" style="margin-top:4px"><div class="section-title">Historique récent</div></div>';
    html += '<div class="card" style="margin:0 16px">';
    allEntries.slice(0, 20).forEach((e, i) => {
      const date = new Date(e.date).toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
      html += `<div class="history-item" style="${i===allEntries.slice(0,20).length-1?'border-bottom:none':''}">
        <div class="history-dot"></div>
        <div class="history-info">
          <div class="history-name" style="font-size:13px">${e.exo}</div>
          <div class="history-date">${date}</div>
        </div>
        <div class="history-val">${e.weight} kg × ${e.reps}</div>
      </div>`;
    });
    html += '</div>';
  }

  document.getElementById('stats-content').innerHTML = html;
}

    {time:'Collation soir · 21h', kcal:'~150 kcal · 15 g prot.', lines:['<span>150 g</span> fromage blanc 0% + miel','Caséine lente pendant le sommeil']},

// INIT
renderHome();
